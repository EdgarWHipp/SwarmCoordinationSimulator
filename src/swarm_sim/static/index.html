<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swarm Coordination Simulator</title>
    <style>
      :root {
        --paper: #f2eee6;
        --paper-strong: #fbf8f1;
        --ink: #0d0d0d;
        --ink-muted: #5d5d5d;
        --grid: rgba(13, 13, 13, 0.08);
        --accent: #ff5a1f;
        --accent-soft: rgba(255, 90, 31, 0.16);
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        color: var(--ink);
        background: var(--paper);
      }

      .app-shell {
        width: min(1460px, calc(100vw - 32px));
        margin: 20px auto 24px;
        display: grid;
        grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.8fr);
        gap: 14px;
        align-items: start;
      }

      .viewport,
      .panel {
        position: relative;
        background: var(--paper-strong);
        border: 3px solid var(--ink);
        border-radius: 0;
        box-shadow: 10px 10px 0 var(--ink);
        overflow: hidden;
      }

      .viewport::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 64px 64px;
        pointer-events: none;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        background: var(--paper-strong);
      }

      .panel {
        padding: 18px;
      }

      h1,
      h2 {
        margin: 0;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1 {
        font-size: 1.65rem;
        line-height: 1.04;
        max-width: 13ch;
      }

      h2 {
        font-size: 0.78rem;
        color: var(--accent);
      }

      p {
        margin: 0;
        color: var(--ink-muted);
        line-height: 1.5;
        max-width: 48ch;
      }

      .header {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0 22px;
      }

      button {
        border: 3px solid var(--ink);
        border-radius: 0;
        padding: 10px 14px;
        font: inherit;
        font-weight: 600;
        color: var(--ink);
        background: var(--paper-strong);
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
        box-shadow: 4px 4px 0 var(--ink);
      }

      button.secondary {
        color: #fff;
        background: var(--accent);
      }

      button.ghost {
        background: transparent;
      }

      button:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--ink);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        padding: 14px;
        border: 2px solid var(--ink);
        border-radius: 0;
        background: #fff;
        box-shadow: 4px 4px 0 rgba(13, 13, 13, 0.12);
      }

      .label {
        color: var(--ink-muted);
        font-size: 0.72rem;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .value {
        font-size: 1.28rem;
        font-weight: 700;
      }

      .event-log {
        margin-top: 22px;
        display: grid;
        gap: 10px;
      }

      .event {
        padding: 12px 14px;
        border-radius: 0;
        background: #fff;
        border: 2px solid var(--ink);
        border-left: 8px solid var(--accent);
        color: var(--ink-muted);
      }

      .status {
        margin-top: 14px;
        color: var(--ink-muted);
        line-height: 1.7;
      }

      .status strong {
        color: var(--ink);
      }

      .status a {
        color: var(--accent);
        text-decoration-thickness: 2px;
      }

      @media (max-width: 980px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .panel {
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="viewport">
        <canvas id="swarm-canvas" width="1280" height="720"></canvas>
      </section>
      <aside class="panel">
        <div class="header">
          <h2>Autonomous Swarm Coordination</h2>
          <h1>Consensus-Driven Drone Simulator</h1>
          <p>
            Boids-style motion, waypoint negotiation, failure injection, and Prometheus-friendly
            swarm health metrics in one loop.
          </p>
        </div>

        <div class="controls">
          <button id="pause-button">Pause</button>
          <button id="resume-button" class="ghost">Resume</button>
          <button id="reset-button" class="secondary">Reset</button>
          <button id="failure-button" class="ghost">Inject Failure</button>
        </div>

        <div class="stats" id="stats-grid"></div>

        <div class="status">
          WebSocket: <strong id="socket-status">connecting</strong><br />
          Metrics: <strong><a href="/metrics" target="_blank" style="color: var(--accent);">/metrics</a></strong>
        </div>

        <div class="event-log" id="event-log"></div>
      </aside>
    </main>

    <script>
      const canvas = document.getElementById("swarm-canvas");
      const ctx = canvas.getContext("2d");
      const statsGrid = document.getElementById("stats-grid");
      const eventLog = document.getElementById("event-log");
      const socketStatus = document.getElementById("socket-status");

      let socket = null;
      let targetState = null;
      let sceneState = null;
      let lastFrameTime = 0;

      const droneSprites = new Map();
      const waypointSprites = new Map();

      const statsOrder = [
        ["active_agents", "Active Drones"],
        ["failed_agents", "Failed Drones"],
        ["cohesion_score", "Cohesion"],
        ["consensus_success_ratio", "Consensus"],
        ["active_collision_pairs", "Active Collisions"],
        ["waypoint_completions", "Waypoint Completions"],
        ["waypoint_completion_rate_per_min", "Completions / Min"],
        ["assignment_changes", "Assignment Changes"],
      ];

      ctx.imageSmoothingEnabled = true;

      function cloneDrone(drone) {
        return {
          ...drone,
          position: { ...drone.position },
          velocity: { ...drone.velocity },
        };
      }

      function cloneWaypoint(waypoint) {
        return {
          ...waypoint,
          position: { ...waypoint.position },
        };
      }

      function syncCanvasSize(state) {
        if (canvas.width !== state.config.width || canvas.height !== state.config.height) {
          canvas.width = state.config.width;
          canvas.height = state.config.height;
          ctx.imageSmoothingEnabled = true;
        }
        canvas.style.aspectRatio = `${state.config.width} / ${state.config.height}`;
      }

      function queueState(state) {
        syncCanvasSize(state);
        targetState = {
          ...state,
          drones: state.drones.map(cloneDrone),
          waypoints: state.waypoints.map(cloneWaypoint),
          events: [...state.events],
        };

        if (!sceneState) {
          droneSprites.clear();
          waypointSprites.clear();
          targetState.drones.forEach((drone) => droneSprites.set(drone.drone_id, cloneDrone(drone)));
          targetState.waypoints.forEach((waypoint) =>
            waypointSprites.set(waypoint.waypoint_id, cloneWaypoint(waypoint))
          );
          sceneState = {
            ...targetState,
            drones: Array.from(droneSprites.values()),
            waypoints: Array.from(waypointSprites.values()),
          };
        }

        renderStats(state.summary);
        renderEvents(state.events);
      }

      function drawGridOverlay() {
        ctx.save();
        ctx.strokeStyle = "rgba(13, 13, 13, 0.08)";
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 64) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 64) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBackdrop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fbf8f1";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 90, 31, 0.08)";
        ctx.fillRect(24, 24, Math.max(120, canvas.width * 0.18), 20);
        drawGridOverlay();
        ctx.strokeStyle = "#0d0d0d";
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
      }

      function drawWaypoint(waypoint) {
        const { x, y } = waypoint.position;
        const size = waypoint.claimed_by ? 22 : 16;
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = waypoint.claimed_by ? "rgba(255, 90, 31, 0.08)" : "rgba(13, 13, 13, 0.03)";
        ctx.strokeStyle = waypoint.claimed_by ? "#ff5a1f" : "rgba(13, 13, 13, 0.52)";
        ctx.lineWidth = 2.5;
        ctx.fillRect(-size / 2, -size / 2, size, size);
        ctx.strokeRect(-size / 2, -size / 2, size, size);
        ctx.fillStyle = waypoint.claimed_by ? "#ff5a1f" : "#0d0d0d";
        ctx.fillRect(-3, -3, 6, 6);
        ctx.restore();
      }

      function drawDrone(drone) {
        const { x, y } = drone.position;
        const angle = Math.atan2(drone.velocity.y, drone.velocity.x);
        const speed = Math.hypot(drone.velocity.x, drone.velocity.y);
        const length = drone.failed ? 18 : 20 + Math.min(speed * 0.12, 7);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Number.isFinite(angle) ? angle : 0);
        ctx.fillStyle = drone.failed ? "rgba(13, 13, 13, 0.18)" : "#0d0d0d";
        ctx.fillRect(-length * 0.5, -6, length, 12);
        ctx.fillStyle = drone.failed ? "#b42318" : "#ff5a1f";
        ctx.fillRect(length * 0.15, -6, Math.max(6, length * 0.35), 12);

        if (drone.failed) {
          ctx.strokeStyle = "#b42318";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(-8, -8);
          ctx.lineTo(8, 8);
          ctx.moveTo(-8, 8);
          ctx.lineTo(8, -8);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAssignments(state) {
        const waypointsById = new Map(state.waypoints.map((waypoint) => [waypoint.waypoint_id, waypoint]));
        ctx.save();
        ctx.strokeStyle = "rgba(13, 13, 13, 0.26)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([12, 8]);

        for (const drone of state.drones) {
          if (!drone.target_waypoint_id || drone.failed) {
            continue;
          }
          const waypoint = waypointsById.get(drone.target_waypoint_id);
          if (!waypoint) {
            continue;
          }
          ctx.beginPath();
          ctx.moveTo(drone.position.x, drone.position.y);
          ctx.lineTo(waypoint.position.x, waypoint.position.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function snapOrBlendPosition(sprite, target, alpha, snapDistance) {
        const dx = target.position.x - sprite.position.x;
        const dy = target.position.y - sprite.position.y;
        if ((dx * dx) + (dy * dy) > snapDistance * snapDistance) {
          sprite.position.x = target.position.x;
          sprite.position.y = target.position.y;
          return;
        }
        sprite.position.x += dx * alpha;
        sprite.position.y += dy * alpha;
      }

      function advanceSceneState(deltaMs) {
        if (!targetState) {
          return null;
        }

        const droneAlpha = 1 - Math.exp(-Math.min(deltaMs, 48) / 70);
        const waypointAlpha = 1 - Math.exp(-Math.min(deltaMs, 48) / 90);

        const nextDrones = targetState.drones.map((drone) => {
          const sprite = droneSprites.get(drone.drone_id) ?? cloneDrone(drone);
          snapOrBlendPosition(sprite, drone, droneAlpha, 180);
          sprite.velocity.x += (drone.velocity.x - sprite.velocity.x) * droneAlpha;
          sprite.velocity.y += (drone.velocity.y - sprite.velocity.y) * droneAlpha;
          sprite.failed = drone.failed;
          sprite.target_waypoint_id = drone.target_waypoint_id;
          droneSprites.set(drone.drone_id, sprite);
          return sprite;
        });

        const nextWaypoints = targetState.waypoints.map((waypoint) => {
          const sprite = waypointSprites.get(waypoint.waypoint_id) ?? cloneWaypoint(waypoint);
          snapOrBlendPosition(sprite, waypoint, waypointAlpha, 260);
          sprite.claimed_by = waypoint.claimed_by;
          sprite.completions = waypoint.completions;
          sprite.priority = waypoint.priority;
          waypointSprites.set(waypoint.waypoint_id, sprite);
          return sprite;
        });

        sceneState = {
          ...targetState,
          drones: nextDrones,
          waypoints: nextWaypoints,
        };
        return sceneState;
      }

      function drawState(state) {
        drawBackdrop();
        drawAssignments(state);
        state.waypoints.forEach(drawWaypoint);
        state.drones.forEach(drawDrone);
      }

      function renderStats(summary) {
        statsGrid.innerHTML = "";
        statsOrder.forEach(([key, label]) => {
          const wrapper = document.createElement("div");
          wrapper.className = "stat";
          wrapper.innerHTML = `
            <div class="label">${label}</div>
            <div class="value">${summary[key]}</div>
          `;
          statsGrid.appendChild(wrapper);
        });
      }

      function renderEvents(events) {
        eventLog.innerHTML = "";
        events.slice().reverse().forEach((event) => {
          const item = document.createElement("div");
          item.className = "event";
          item.textContent = event;
          eventLog.appendChild(item);
        });
      }

      async function postAction(path) {
        await fetch(path, { method: "POST" });
      }

      async function loadInitialState() {
        const response = await fetch("/api/state");
        const state = await response.json();
        queueState(state);
      }

      function connectSocket() {
        socket = new WebSocket(`${window.location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}/ws`);
        socketStatus.textContent = "connecting";

        socket.onopen = () => {
          socketStatus.textContent = "live";
          socket.send("subscribe");
        };

        socket.onmessage = (event) => {
          queueState(JSON.parse(event.data));
        };

        socket.onclose = () => {
          socketStatus.textContent = "reconnecting";
          setTimeout(connectSocket, 1000);
        };
      }

      function animate(frameTime) {
        if (!lastFrameTime) {
          lastFrameTime = frameTime;
        }
        const deltaMs = frameTime - lastFrameTime;
        lastFrameTime = frameTime;

        const nextState = advanceSceneState(deltaMs);
        if (nextState) {
          drawState(nextState);
        }
        requestAnimationFrame(animate);
      }

      document.getElementById("pause-button").addEventListener("click", () => postAction("/api/pause"));
      document.getElementById("resume-button").addEventListener("click", () => postAction("/api/resume"));
      document.getElementById("reset-button").addEventListener("click", () => postAction("/api/reset"));
      document.getElementById("failure-button").addEventListener("click", () => postAction("/api/fail-random"));

      loadInitialState().then(() => {
        requestAnimationFrame(animate);
        connectSocket();
      });
    </script>
  </body>
</html>
